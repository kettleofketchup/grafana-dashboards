name: release

on:
  push:
    tags:
    - "*"

permissions:
  contents: write
  id-token: write  # PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: pyproject.toml

    - name: Install dependencies
      run: uv sync --frozen --no-default-groups || uv sync

    - name: Build wheel + sdist
      run: uv build

    - name: Generate dashboard JSON
      run: uv run kgd generate --output dashboards-out

    - name: Prepare release notes
      run: uv tool run git-changelog --release-notes > release-notes.md

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release-notes.md
        files: |
          dist/*.whl
          dist/*.tar.gz
          dashboards-out/*.json

    - name: Publish to PyPI
      # Trusted Publishing — configure once at:
      #   https://pypi.org/manage/account/publishing/
      # Project=kettle-grafana-dashboards, owner=kettleofketchup,
      # repo=grafana-dashboards, workflow=release.yml, environment=(blank).
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
        skip-existing: true
