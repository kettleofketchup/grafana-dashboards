name: release

on:
  push:
    tags:
    - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: pyproject.toml

    # Install runtime deps + the project only. We need the SDK to render
    # JSON; we don't need the docs/lint/test toolchain in the release
    # job. `uv.lock` is gitignored so we don't pass `--frozen`.
    - name: Install runtime dependencies
      run: uv sync --no-default-groups

    # PyPI rejects distributions whose Requires-Dist contains a direct
    # URL — and grafana-foundation-sdk's v2beta1 builders only exist on
    # the SDK's main branch right now, so we have to pin it via git+URL.
    # Until upstream cuts a PyPI release with v2 builders, we ship the
    # generated JSON as Release assets only.
    #
    # When the SDK ships v2 to PyPI: relax the dep in pyproject.toml,
    # add `uv build` + a `pypa/gh-action-pypi-publish` step, attach
    # dist/*.whl + dist/*.tar.gz to the Release files: list, set
    # permissions.id-token: write at the top of the job.
    - name: Run tests
      run: uv run pytest tests/

    - name: Generate dashboard JSON
      run: uv run kgd generate --output dashboards-out

    - name: Prepare release notes
      run: uv tool run git-changelog --release-notes > release-notes.md

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release-notes.md
        files: dashboards-out/*.json
